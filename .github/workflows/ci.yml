name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Solana (Agave)
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v3.0.15/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Cache anchor-cli
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/anchor
          key: anchor-cli-0.30.1-${{ runner.os }}

      - name: Install anchor-cli 0.30.1
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        # --locked fails on rustc >= 1.80 (stale `time` crate in the 0.30.1
        # lockfile); the unlocked resolve builds fine.
        run: cargo install anchor-cli --version 0.30.1 --force

      - name: npm ci
        run: npm ci

      - name: anchor build
        run: anchor build

      - name: clippy (deny warnings)
        run: cargo clippy -p ephemere --all-targets -- -D warnings

      - name: test suite (lifecycle + adversarial + curve fuzz)
        run: npm test
